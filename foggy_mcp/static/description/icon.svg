<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Data bridge icon: two databases connected by an arrow -->
  <!-- Left database (Odoo) -->
  <ellipse cx="38" cy="42" rx="16" ry="6" fill="none" stroke="white" stroke-width="2.5"/>
  <path d="M22 42 v20 a16 6 0 0 0 32 0 v-20" fill="none" stroke="white" stroke-width="2.5"/>
  <ellipse cx="38" cy="52" rx="16" ry="6" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Right node (AI) -->
  <circle cx="92" cy="52" r="14" fill="none" stroke="white" stroke-width="2.5"/>
  <text x="92" y="57" text-anchor="middle" fill="white" font-size="14" font-family="Arial, sans-serif" font-weight="bold">AI</text>
  <!-- Arrow connecting them -->
  <line x1="56" y1="52" x2="74" y2="52" stroke="white" stroke-width="2.5"/>
  <polygon points="74,47 82,52 74,57" fill="white"/>
  <!-- MCP label -->
  <text x="64" y="90" text-anchor="middle" fill="white" font-size="11" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="1">MCP</text>
  <text x="64" y="104" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="9" font-family="Arial, sans-serif">GATEWAY</text>
</svg>
