version: '3.8'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — shared by Odoo and Foggy
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: foggy-odoo-postgres
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: odoo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────
  # Odoo 17 — with foggy_mcp addon
  # ──────────────────────────────────────────────
  odoo:
    image: odoo:17.0
    container_name: foggy-odoo
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: postgres
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./foggy_mcp:/mnt/extra-addons/foggy_mcp:ro
      - odoo-data:/var/lib/odoo
    command:
      - odoo
      - --database=odoo
      - --addons-path=/mnt/extra-addons
      - --db_host=postgres
      - --db_port=5432
      - --db_user=odoo
      - --db_password=odoo
      - --admin_passwd=admin

  # ──────────────────────────────────────────────
  # Foggy MCP Server (Java) — with built-in Odoo models
  # Data source configured via API after startup
  # ──────────────────────────────────────────────
  foggy-mcp:
    image: foggysource/foggy-odoo-mcp:v8.1.8-beta
    container_name: foggy-mcp-server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7108:8080"
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: lite,odoo
      FOGGY_AUTH_TOKEN: foggy_dev_token_replace_in_production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  odoo-data: